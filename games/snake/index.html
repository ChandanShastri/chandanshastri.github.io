<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #060816;
            --grid-color: #111827;
            --snake-head: #62f6b0;
            --snake-body: #21c97a;
            --food-color: #ff4d7a;
            --text-color: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 30%),
                radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.22), transparent 28%),
                var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px 0 24px;
            gap: 12px;
        }

        header {
            position: relative;
            width: min(100%, 620px);
            padding: 0 16px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            z-index: 10;
            pointer-events: auto;
            flex-wrap: wrap;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex: 1;
        }

        .player-name-chip,
        .score-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 8px 24px rgba(0, 0, 0, 0.24);
        }

        .player-name-chip {
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            color: #f8fafc;
            min-height: 42px;
            display: flex;
            align-items: center;
            max-width: 188px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-board {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1.05rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.45);
        }

        .score-item {
            padding: 8px 14px;
            border-radius: 999px;
            text-align: center;
        }

        #boost-status {
            color: #fef3c7;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: all 0.2s ease;
            min-width: 100px;
        }

        #boost-status.boost-active {
            background: linear-gradient(135deg, #fbbf24, #f97316);
            color: #111827;
            box-shadow: 0 0 18px rgba(251, 191, 36, 0.45);
            animation: boostPulse 1s infinite;
        }

        @keyframes boostPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        canvas {
            background-color: var(--grid-color);
            border-radius: 18px;
            display: block;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38), inset 0 0 0 1px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(6, 8, 22, 0.92), rgba(15, 23, 42, 0.86));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.3s ease;
            border-radius: 18px;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3.2rem;
            margin: 0 0 16px 0;
            background: linear-gradient(135deg, #62f6b0 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 28px rgba(98, 246, 176, 0.28);
            letter-spacing: -1px;
        }

        button {
            background: linear-gradient(135deg, #62f6b0 0%, #00c2ff 100%);
            border: none;
            padding: 14px 36px;
            font-size: 1.25rem;
            font-weight: 800;
            color: #04111d;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 194, 255, 0.24);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            touch-action: manipulation;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 34px rgba(0, 194, 255, 0.32);
        }

        button:active {
            transform: scale(0.96);
            box-shadow: 0 6px 16px rgba(0, 194, 255, 0.24);
        }

        .subtitle {
            margin: 0 0 20px 0;
            color: #cbd5e1;
            font-size: 1rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .player-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .player-prompt label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.12) 50%, rgba(0, 0, 0, 0.12));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.28;
        }

        #player-name {
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid #00d4ff;
            color: #fff;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 999px;
            margin-bottom: 12px;
            text-align: center;
            outline: none;
            width: 84%;
            max-width: 300px;
            font-family: inherit;
            box-shadow: 0 0 14px rgba(0, 212, 255, 0.2);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        #player-name:focus {
            box-shadow: 0 0 24px rgba(0, 212, 255, 0.35);
            border-color: #62f6b0;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <header>
            <div class="top-bar">
                <div class="player-name-chip" id="player-name-chip">Player: Anonymous</div>
                <div class="score-board">
                    <div class="score-item">Score: <span id="score">0</span></div>
                    <div class="score-item">Best: <span id="high-score">0</span></div>
                    <div class="score-item" id="boost-status">Boost: Ready</div>
                </div>
            </div>
        </header>

        <canvas id="game-canvas"></canvas>

        <div id="ui-layer">
            <h1 id="game-title">SNAKE</h1>
            <p class="subtitle" id="game-msg">Swipe or Use Arrow Keys</p>
            <div class="player-prompt">
                <label for="player-name">Player Name</label>
                <input type="text" id="player-name" placeholder="Enter Name" maxlength="12">
            </div>
            <button id="start-btn">PLAY</button>
        </div>

        <div class="scanlines"></div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const uiLayer = document.getElementById('ui-layer');
        const startBtn = document.getElementById('start-btn');
        const gameTitle = document.getElementById('game-title');
        const gameMsg = document.getElementById('game-msg');
        const nameInput = document.getElementById('player-name');
        const playerNameChip = document.getElementById('player-name-chip');
        const boostStatusEl = document.getElementById('boost-status');

        const GRID_SIZE = 20;
        let TILE_COUNT_X = 20;
        let TILE_COUNT_Y = 20;
        let GAME_SPEED = 125;

        let snake = [];
        let food = { x: 0, y: 0, type: 'normal' };
        let velocity = { x: 0, y: 0 };
        let nextVelocity = { x: 0, y: 0 };
        let score = 0;
        let isGameRunning = false;
        let lastTime = 0;
        let particles = [];
        let foodColor = '#ff4d7a';
        let boostActive = false;
        let boostUntil = 0;
        let shrinkActive = false;
        let shrinkUntil = 0;
        let normalFoodStreak = 0;

        let currentPlayer = localStorage.getItem('snakeLastPlayer') || '';
        nameInput.value = currentPlayer;
        updateHighScoreDisplay();
        updateBoostStatus();

        function getHighScore(name) {
            const safeName = name || 'Anonymous';
            return parseInt(localStorage.getItem(`snakeHighScore_${safeName}`) || '0', 10);
        }

        function updateHighScoreDisplay() {
            const name = nameInput.value.trim() || 'Anonymous';
            highScoreEl.innerText = getHighScore(name);
            playerNameChip.innerText = `Player: ${name}`;
        }

        function updateBoostStatus() {
            if (boostActive) {
                const secondsLeft = Math.max(0, Math.ceil((boostUntil - performance.now()) / 1000));
                boostStatusEl.innerText = `⚡ Boost ${secondsLeft}s`;
                boostStatusEl.classList.add('boost-active');
                boostStatusEl.style.color = '#111827';
            } else {
                boostStatusEl.innerText = '⚡ Boost Ready';
                boostStatusEl.classList.remove('boost-active');
                boostStatusEl.style.color = '#fef3c7';
            }
        }

        nameInput.addEventListener('input', () => {
            updateHighScoreDisplay();
            localStorage.setItem('snakeLastPlayer', nameInput.value.trim());
        });

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 24, 640);
            const headerHeight = document.querySelector('header')?.offsetHeight || 0;
            const maxHeight = Math.max(260, window.innerHeight - headerHeight - 44);

            const cols = Math.floor((maxWidth - 20) / GRID_SIZE);
            const rows = Math.floor((maxHeight - 20) / GRID_SIZE);

            TILE_COUNT_X = Math.max(10, cols);
            TILE_COUNT_Y = Math.max(10, rows);

            canvas.width = TILE_COUNT_X * GRID_SIZE;
            canvas.height = TILE_COUNT_Y * GRID_SIZE;
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!isGameRunning) {
                draw();
            }
        });

        resizeCanvas();

        function addParticleBurst(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x,
                    y,
                    vx: (Math.random() - 0.5) * 3.2,
                    vy: (Math.random() - 0.5) * 3.2,
                    life: 22 + Math.random() * 14,
                    size: 2 + Math.random() * 3,
                    color
                });
            }
        }

        function updateParticles() {
            particles = particles.filter((p) => p.life > 0);
            particles.forEach((p) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.02;
                p.life -= 1;
            });
        }

        function initGame() {
            const startX = Math.floor(TILE_COUNT_X / 2);
            const startY = Math.floor(TILE_COUNT_Y / 2);

            snake = [
                { x: startX, y: startY },
                { x: startX, y: startY + 1 },
                { x: startX, y: startY + 2 }
            ];

            velocity = { x: 0, y: -1 };
            nextVelocity = { x: 0, y: -1 };
            score = 0;
            GAME_SPEED = 125;
            scoreEl.innerText = score;
            particles = [];
            boostActive = false;
            boostUntil = 0;
            shrinkActive = false;
            shrinkUntil = 0;
            normalFoodStreak = 0;
            updateBoostStatus();
            placeFood();
            isGameRunning = true;
            uiLayer.classList.add('hidden');

            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isGameRunning = false;
            const name = nameInput.value.trim() || 'Anonymous';
            const currentHighScore = getHighScore(name);

            if (score > currentHighScore) {
                localStorage.setItem(`snakeHighScore_${name}`, score);
                highScoreEl.innerText = score;
            }

            gameTitle.innerText = 'GAME OVER';
            gameMsg.innerText = `Score: ${score}\nBest: ${currentHighScore}`;
            startBtn.innerText = 'PLAY AGAIN';
            uiLayer.classList.remove('hidden');
        }

        function placeFood() {
            const palette = ['#ff4d7a', '#ffb347', '#8b5cf6', '#00d4ff'];
            foodColor = palette[Math.floor(Math.random() * palette.length)];

            const randomRoll = Math.random();
            if (boostActive) {
                food.type = 'normal';
            } else if (normalFoodStreak >= 3) {
                if (randomRoll < 0.35) {
                    food.type = 'boost';
                } else if (randomRoll < 0.55) {
                    food.type = 'shrink';
                } else {
                    food.type = 'normal';
                }
                if (food.type !== 'normal') {
                    normalFoodStreak = 0;
                }
            } else {
                food.type = 'normal';
            }

            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * TILE_COUNT_X);
                food.y = Math.floor(Math.random() * TILE_COUNT_Y);

                valid = true;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }

            if (food.type === 'shrink') {
                food.spawnedAt = performance.now();
            }
        }

        function update() {
            velocity = { ...nextVelocity };

            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

            if (head.x < 0 || head.x >= TILE_COUNT_X || head.y < 0 || head.y >= TILE_COUNT_Y) {
                return gameOver();
            }

            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                const burstX = food.x * GRID_SIZE + GRID_SIZE / 2;
                const burstY = food.y * GRID_SIZE + GRID_SIZE / 2;
                addParticleBurst(burstX, burstY, foodColor);

                if (food.type === 'boost') {
                    boostActive = true;
                    boostUntil = performance.now() + 10000;
                    updateBoostStatus();
                }

                if (food.type === 'normal') {
                    normalFoodStreak += 1;
                } else {
                    normalFoodStreak = 0;
                }

                if (food.type === 'shrink') {
                    const targetLength = Math.max(3, Math.floor(snake.length / 2));
                    snake = snake.slice(0, targetLength);
                    shrinkActive = true;
                    shrinkUntil = performance.now() + 3000;
                }

                GAME_SPEED = Math.max(55, 125 - Math.floor(score / 30) * 6);
                placeFood();
            } else {
                snake.pop();
            }
        }

        function drawBoard() {
            const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bg.addColorStop(0, '#0f172a');
            bg.addColorStop(1, '#111827');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.globalAlpha = 0.22;
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 0.7;
            for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawFood() {
            const cx = food.x * GRID_SIZE + GRID_SIZE / 2;
            const cy = food.y * GRID_SIZE + GRID_SIZE / 2;
            const radius = GRID_SIZE / 2 - 3;
            const pulse = 0.9 + 0.12 * Math.sin(performance.now() / 220);
            const isBoost = food.type === 'boost';
            const isShrink = food.type === 'shrink';
            const grad = ctx.createRadialGradient(cx - 3, cy - 4, 2, cx, cy, radius + 4);
            grad.addColorStop(0, '#fff3d1');
            grad.addColorStop(0.25, isBoost ? '#fbbf24' : isShrink ? '#4ade80' : foodColor);
            grad.addColorStop(1, isBoost ? '#f59e0b' : isShrink ? '#16a34a' : '#ff235f');

            ctx.save();
            if (isBoost || isShrink) {
                ctx.strokeStyle = isBoost ? '#fff59d' : '#bef264';
                ctx.lineWidth = 2.2;
                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                ctx.arc(cx, cy, radius + 4 + Math.sin(performance.now() / 140) * 1.6, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.shadowBlur = 22;
            ctx.shadowColor = isBoost ? '#f59e0b' : isShrink ? '#4ade80' : foodColor;
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, radius * pulse, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            if (isBoost) {
                ctx.save();
                ctx.fillStyle = '#fff7ed';
                ctx.font = 'bold 12px Segoe UI';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚡', cx, cy + 1);
                ctx.restore();
            } else if (isShrink) {
                ctx.save();
                ctx.fillStyle = '#ecfdf5';
                ctx.font = 'bold 12px Segoe UI';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('↘', cx, cy + 1);
                ctx.restore();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                const x = part.x * GRID_SIZE + 1;
                const y = part.y * GRID_SIZE + 1;
                const size = GRID_SIZE - 2;
                const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
                gradient.addColorStop(0, isHead ? '#8ff8c3' : '#2ecf84');
                gradient.addColorStop(1, isHead ? '#62f6b0' : '#1aa965');

                ctx.save();
                ctx.shadowBlur = isHead ? 20 : 8;
                ctx.shadowColor = isHead ? '#62f6b0' : '#1aa965';
                ctx.fillStyle = gradient;
                ctx.fillRect(x, y, size, size);
                ctx.restore();

                if (isHead) {
                    ctx.save();
                    ctx.fillStyle = '#062b1c';
                    ctx.beginPath();
                    ctx.arc(x + size * 0.33, y + size * 0.34, size * 0.08, 0, Math.PI * 2);
                    ctx.arc(x + size * 0.67, y + size * 0.34, size * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillRect(x + size * 0.28, y + size * 0.6, size * 0.44, size * 0.08);
                    ctx.restore();
                }
            });
        }

        function drawBoostOverlay() {
            if (!boostActive) return;

            const secondsLeft = Math.max(0, Math.ceil((boostUntil - performance.now()) / 1000));
            ctx.save();
            ctx.fillStyle = 'rgba(251, 191, 36, 0.16)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fde68a';
            ctx.font = 'bold 16px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText(`BOOST ACTIVE • ${secondsLeft}s`, canvas.width / 2, 24);
            ctx.restore();
        }

        function draw() {
            drawBoard();
            drawBoostOverlay();
            drawParticles();
            drawFood();
            drawSnake();
        }

        function drawParticles() {
            particles.forEach((p) => {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life / 36);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function gameLoop(currentTime) {
            if (!isGameRunning) return;

            if (boostActive && currentTime >= boostUntil) {
                boostActive = false;
                updateBoostStatus();
            }

            if (food.type === 'shrink' && food.spawnedAt && currentTime - food.spawnedAt >= 3000) {
                food.type = 'normal';
                food.spawnedAt = null;
            }

            updateBoostStatus();

            const deltaTime = currentTime - lastTime;
            const activeSpeed = boostActive ? Math.max(45, GAME_SPEED - 70) : GAME_SPEED;

            if (deltaTime >= activeSpeed) {
                update();
                lastTime = currentTime;
            }

            updateParticles();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    initGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                    if (velocity.y === 0) nextVelocity = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (velocity.y === 0) nextVelocity = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (velocity.x === 0) nextVelocity = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (velocity.x === 0) nextVelocity = { x: 1, y: 0 };
                    break;
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && velocity.x === 0) nextVelocity = { x: 1, y: 0 };
                else if (dx < 0 && velocity.x === 0) nextVelocity = { x: -1, y: 0 };
            } else {
                if (dy > 0 && velocity.y === 0) nextVelocity = { x: 0, y: 1 };
                else if (dy < 0 && velocity.y === 0) nextVelocity = { x: 0, y: -1 };
            }
        });

        startBtn.addEventListener('click', initGame);
        draw();
    </script>
