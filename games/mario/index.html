<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Simple Mario</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            padding: 0;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 38%),
                linear-gradient(180deg, #8fc9ff 0%, #5c94fc 45%, #3a6fe0 100%);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0));
            overflow: hidden;
            box-shadow: inset 0 0 0 4px rgba(255, 255, 255, 0.14), 0 25px 60px rgba(0, 0, 0, 0.25);
        }

        #game-container::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 20%),
                radial-gradient(circle at 80% 15%, rgba(255, 255, 255, 0.08), transparent 18%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.08));
            mix-blend-mode: screen;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            /* Crucial for retro look */
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 3;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 0 2px 0 rgba(0, 0, 0, 0.55), 0 0 12px rgba(0, 0, 0, 0.22);
            font-size: 16px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.08));
            backdrop-filter: blur(4px);
            box-sizing: border-box;
        }

        #start-screen,
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            pointer-events: auto;
            z-index: 10;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.25s ease-out;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffcc00;
            text-shadow: 4px 4px #c23e00, 0 0 20px rgba(255, 204, 0, 0.2);
            letter-spacing: 2px;
        }

        p {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            max-width: 80vw;
        }

        input {
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        }

        button {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 30px;
            font-size: 16px;
            background: #e52521;
            color: #fff;
            border: none;
            border-bottom: 4px solid #9c1a16;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
            box-shadow: 0 10px 0 rgba(156, 26, 22, 0.35), 0 14px 28px rgba(0, 0, 0, 0.18);
            letter-spacing: 1px;
        }

        button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(4px);
            border-bottom: none;
            margin-bottom: 4px;
            box-shadow: 0 4px 0 rgba(156, 26, 22, 0.35), 0 8px 18px rgba(0, 0, 0, 0.16);
        }

        .hidden {
            display: none !important;
        }

        /* Mobile Controls Hints */
        #mobile-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            pointer-events: none;
            display: none;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 10px;
            }

            #mobile-hint {
                display: block;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.35;
                transform: translateY(0);
            }

            50% {
                opacity: 0.75;
                transform: translateY(-3px);
            }
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <div class="hud">
                <div id="score-display">MARIO 000000</div>
                <div id="coin-display">COINS 00</div>
                <div id="lives-display">LIVES 3</div>
                <div id="high-score-display">HIGH 000000</div>
            </div>
            <div id="mobile-hint">TAP TO JUMP</div>
        </div>

        <div id="start-screen">
            <h1>SUPER JS BROS</h1>
            <p>ENTER YOUR NAME</p>
            <input type="text" id="player-name-input" maxlength="8" placeholder="PLAYER">
            <button id="start-button">START GAME</button>
            <p style="margin-top: 20px; font-size: 10px;">SPACE / TOUCH TO JUMP</p>
        </div>

        <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p>SCORE: <span id="final-score">0</span></p>
            <button id="restart-button">TRY AGAIN</button>
        </div>
    </div>

    <script>
        // --- Constants & Config ---
        const GRAVITY = 0.45;
        const TERMINAL_VELOCITY = 12;
        const JUMP_FORCE = -12.5;
        const MOVE_SPEED = 4;
        const SCROLL_SPEED = 2; // Initial scroll speed

        // --- State ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let frameCount = 0;
        let score = 0;
        let highScore = 0;
        let playerName = 'PLAYER';
        let time = 0;
        let screenShake = 0;
        let coins = [];
        let coinCount = 0;
        let lives = 3;
        let invulnerableTimer = 0;

        // Game Objects
        let player = {
            x: 100,
            y: 0,
            width: 32,
            height: 32,
            vx: 0,
            vy: 0,
            grounded: false,
            facing: 1,
            walkCycle: 0,
            color: '#e52521' // Mario Red
        };

        let platforms = [];
        let enemies = [];
        let particles = [];
        let clouds = [];
        let pipes = [];
        let gameSpeed = SCROLL_SPEED;
        let floorY = 0; // Calculated based on canvas height

        // --- Assets (Procedural for single file) ---
        // We'll draw pixel art programmatically to keep it single file

        // --- Input Handling ---
        const keys = {};

        let jumpBuffer = 0;
        let coyoteTime = 0;
        const JUMP_BUFFER_FRAMES = 5;
        const COYOTE_TIME_FRAMES = 5;

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault(); // Prevent scrolling
                jumpBuffer = JUMP_BUFFER_FRAMES;
            }
            if (e.code === 'ArrowRight') keys['Right'] = true;
            if (e.code === 'ArrowLeft') keys['Left'] = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                // Variable Jump Height: Cut velocity if released early
                if (player.vy < -5) {
                    player.vy = -5;
                }
            }
            if (e.code === 'ArrowRight') keys['Right'] = false;
            if (e.code === 'ArrowLeft') keys['Left'] = false;
        });

        // Touch controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent scrolling
            if (gameState === 'START') startGame();
            else if (gameState === 'GAMEOVER') resetGame();
            else if (gameState === 'PLAYING') {
                jumpBuffer = JUMP_BUFFER_FRAMES;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (player.vy < -5) {
                player.vy = -5;
            }
        });

        // --- Initialization ---
        function init() {
            resize();
            window.addEventListener('resize', resize);

            // Load High Score
            const savedScore = localStorage.getItem('marioCloneHighScore');
            const savedName = localStorage.getItem('marioClonePlayerName');
            if (savedScore) highScore = parseInt(savedScore);
            if (savedName) playerName = savedName;

            updateUI();

            // Bind Buttons
            document.getElementById('start-button').addEventListener('click', startGame);
            document.getElementById('restart-button').addEventListener('click', resetGame);

            requestAnimationFrame(loop);
        }

        function resize() {
            // Set canvas to full window size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            floorY = canvas.height - 64; // Ground height relative to bottom

            // Ensure player doesn't fall through if resized while grounded
            if (player.y > floorY - player.height) {
                player.y = floorY - player.height;
            }
        }

        function startGame() {
            const nameInput = document.getElementById('player-name-input');
            if (nameInput.value.trim() !== '') {
                playerName = nameInput.value.trim().toUpperCase();
                localStorage.setItem('marioClonePlayerName', playerName);
            }

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            resetGameVars();
            gameState = 'PLAYING';
        }

        function resetGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            resetGameVars();
            gameState = 'PLAYING';
        }

        function resetGameVars() {
            score = 0;
            frameCount = 0;
            gameSpeed = SCROLL_SPEED;
            coinCount = 0;
            lives = 3;
            invulnerableTimer = 0;
            coins = [];

            player.x = 100;
            player.y = 100;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;

            platforms = [];
            enemies = [];
            particles = [];
            clouds = [];
            pipes = [];

            // Initial Ground
            // Create very wide ground segments to cover the screen
            const segments = Math.ceil(canvas.width / 800) + 1;
            for (let i = 0; i < segments; i++) {
                platforms.push({
                    x: i * 800,
                    y: floorY,
                    width: 800,
                    height: 64,
                    type: 'ground'
                });
            }

            // Initial Clouds
            addCloud(100);
            addCloud(400);
            addCloud(700);
        }

        // --- Core Game Loop ---
        function loop() {
            if (gameState === 'PLAYING') {
                update();
            }
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            frameCount++;
            time += 1;

            if (screenShake > 0) {
                screenShake *= 0.85;
                if (screenShake < 0.25) screenShake = 0;
            }

            // 1. Difficulty Scaling
            if (frameCount % 600 === 0) gameSpeed += 0.2;

            // 2. Score
            if (frameCount % 10 === 0) score++;

            // 3. Player Physics
            if (keys['Right']) player.vx += 0.5;
            if (keys['Left']) player.vx -= 0.5;
            if (keys['Right']) player.facing = 1;
            if (keys['Left']) player.facing = -1;

            // Friction 
            player.vx *= 0.9;

            // Limits
            if (player.vx > MOVE_SPEED) player.vx = MOVE_SPEED;
            if (player.vx < -MOVE_SPEED) player.vx = -MOVE_SPEED;

            // Apply velocities
            player.x += player.vx;
            player.y += player.vy;
            player.vy += GRAVITY;
            if (player.vy > TERMINAL_VELOCITY) player.vy = TERMINAL_VELOCITY;

            // Keep player in bounds
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // 4. Platform Logic & Collision
            let wasGrounded = player.grounded;
            player.grounded = false;

            for (let i = platforms.length - 1; i >= 0; i--) {
                let p = platforms[i];
                p.x -= gameSpeed;

                // Collision Detection
                if (
                    player.x < p.x + p.width &&
                    player.x + player.width > p.x &&
                    player.y + player.height > p.y &&
                    player.y < p.y + p.height
                ) {
                    const overlapY = (player.y + player.height) - p.y;
                    if (overlapY < 32 && player.vy > 0 && player.y + player.height - player.vy <= p.y + 10) {
                        player.grounded = true;
                        player.vy = 0;
                        player.y = p.y - player.height;
                    }
                }

                // Remove off-screen platforms
                if (p.x + p.width < -100) {
                    platforms.splice(i, 1);
                }
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                pipe.x -= gameSpeed;

                resolveSolidCollision(player, pipe, true);

                if (pipe.x + pipe.width < -100) {
                    pipes.splice(i, 1);
                }
            }

            if (player.grounded && !wasGrounded) {
                createParticles(player.x + player.width / 2, player.y + player.height, '#f5d18c', 10, 5);
            }

            // Coyote Time Logic
            if (player.grounded) {
                coyoteTime = COYOTE_TIME_FRAMES;
            } else {
                coyoteTime--;
            }

            // Jump Buffering Logic
            if (jumpBuffer > 0) {
                jumpBuffer--;
                if (coyoteTime > 0) {
                    jump();
                    coyoteTime = 0; // Consumption
                    jumpBuffer = 0;
                }
            }

            // Pit death
            if (player.y > canvas.height) {
                die();
            }

            // 5. Coin Logic
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.x -= gameSpeed;
                coin.spin += 0.2;

                if (!coin.collected &&
                    player.x < coin.x + coin.width &&
                    player.x + player.width > coin.x &&
                    player.y < coin.y + coin.height &&
                    player.y + player.height > coin.y) {
                    coin.collected = true;
                    coinCount++;
                    score += 100;
                    createParticles(coin.x + 8, coin.y + 8, '#ffd54a', 8, 6);
                }

                if (coin.collected || coin.x + coin.width < -100) {
                    coins.splice(i, 1);
                }
            }

            if (invulnerableTimer > 0) {
                invulnerableTimer--;
            }

            // 6. Enemy Logic
            // Spawn Enemies
            if (frameCount % 180 === 0 && Math.random() > 0.3) {
                spawnEnemy();
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.x -= (gameSpeed + e.vx);
                e.vy += GRAVITY * 0.85;
                if (e.vy > TERMINAL_VELOCITY) e.vy = TERMINAL_VELOCITY;
                e.y += e.vy;
                e.grounded = false;

                for (let j = 0; j < platforms.length; j++) {
                    const p = platforms[j];
                    resolveSolidCollision(e, p, false);
                    if (e.grounded) break;
                }

                for (let j = 0; j < pipes.length; j++) {
                    resolveSolidCollision(e, pipes[j], true);
                    if (e.grounded) break;
                }

                e.frame = Math.floor(frameCount / 10) % 2;

                if (
                    player.x < e.x + e.width - 4 &&
                    player.x + player.width > e.x + 4 &&
                    player.y < e.y + e.height &&
                    player.y + player.height > e.y
                ) {
                    const hitFromTop = (player.y + player.height) - e.y;
                    if (hitFromTop < 20 && player.vy > 0) {
                        createParticles(e.x + e.width / 2, e.y + e.height / 2, '#8B4513', 12, 8);
                        enemies.splice(i, 1);
                        player.vy = -6;
                        score += 100;
                    } else if (invulnerableTimer <= 0) {
                        die();
                    }
                }

                if (e.x + e.width < -100) {
                    enemies.splice(i, 1);
                    continue;
                }

                if (e.y > canvas.height + 120) {
                    enemies.splice(i, 1);
                }
            }

            // 7. World Generation (Procedural)
            const lastPlatform = platforms[platforms.length - 1];
            if (lastPlatform && lastPlatform.x + lastPlatform.width < canvas.width + 200) {
                generatePlatform(lastPlatform);
            }

            // Clouds
            clouds.forEach(c => {
                c.x -= gameSpeed * 0.5;
                if (c.x < -100) {
                    c.x = canvas.width + Math.random() * 200;
                    c.y = Math.random() * (canvas.height / 2);
                }
            });

            // 8. Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.life--;
                p.alpha = Math.max(0, p.life / p.maxLife);
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (player.grounded && (Math.abs(player.vx) > 0.2)) {
                player.walkCycle += 0.18 + Math.min(0.25, Math.abs(player.vx) * 0.03);
            } else {
                player.walkCycle += 0.05;
            }

            updateUI();
        }

        function jump() {
            // Logic handled in update loop now regarding checks
            player.vy = JUMP_FORCE;
            player.grounded = false;
        }

        function die() {
            if (lives > 1) {
                lives--;
                invulnerableTimer = 120;
                player.x = 100;
                player.y = 80;
                player.vx = 0;
                player.vy = 0;
                player.grounded = false;
                enemies = [];
                createParticles(player.x + player.width / 2, player.y + player.height / 2, '#f2d18a', 16, 8);
                updateUI();
                return;
            }

            gameState = 'GAMEOVER';
            screenShake = 12;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('marioCloneHighScore', highScore);
            }
            document.getElementById('final-score').innerText = score;
            updateUI();
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function generatePlatform(lastP) {
            const minGap = 80;
            const maxGap = 160;
            const gap = minGap + Math.random() * (maxGap - minGap);

            let newX = lastP.x + lastP.width + gap;
            let newY = floorY;

            if (Math.random() > 0.5) {
                const heightChange = (Math.random() * 100) - 50;
                // newY -= heightChange; // Simplified
            }

            let width = 200 + Math.random() * 600;

            platforms.push({
                x: newX,
                y: newY,
                width: width,
                height: 64,
                type: 'ground'
            });

            if (Math.random() > 0.7) {
                platforms.push({
                    x: newX + 50 + Math.random() * (width - 100),
                    y: newY - 64 * (1 + Math.floor(Math.random() * 2)),
                    width: 48,
                    height: 64 * 3,
                    type: 'block'
                });
            }

            if (Math.random() > 0.55) {
                const coinX = newX + 40 + Math.random() * Math.max(20, width - 80);
                const coinCountRow = 1 + Math.floor(Math.random() * 3);
                spawnCoins(coinX, newY - 78, coinCountRow);
            }

            if (Math.random() > 0.5) {
                const pipeWidth = 48;
                const pipeHeight = 64 + Math.floor(Math.random() * 64);
                pipes.push({
                    x: newX + width * 0.35,
                    y: floorY - pipeHeight,
                    width: pipeWidth,
                    height: pipeHeight,
                    type: 'pipe'
                });
            }
        }

        function spawnEnemy() {
            enemies.push({
                x: canvas.width + 50,
                y: floorY - 32,
                width: 32,
                height: 32,
                vx: -1,
                vy: 0,
                grounded: false,
                color: '#8B4513'
            });
        }

        function spawnCoins(x, y, count) {
            for (let i = 0; i < count; i++) {
                coins.push({
                    x: x + i * 24,
                    y: y,
                    width: 16,
                    height: 16,
                    spin: Math.random() * Math.PI * 2,
                    collected: false
                });
            }
        }

        function addCloud(x) {
            clouds.push({
                x: x || canvas.width + Math.random() * 200,
                y: Math.random() * (canvas.height / 2),
                size: 30 + Math.random() * 30
            });
        }

        function createParticles(x, y, color, count = 8, power = 10, lifeMin = 24, lifeRange = 12) {
            for (let i = 0; i < count; i++) {
                const life = lifeMin + Math.floor(Math.random() * lifeRange);
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * power,
                    vy: (Math.random() - 0.5) * power,
                    life: life,
                    maxLife: life,
                    gravity: 0.22 + Math.random() * 0.18,
                    color: color,
                    size: 3 + Math.random() * 4,
                    alpha: 1
                });
            }
        }

        function updateUI() {
            document.getElementById('score-display').innerText = 'MARIO ' + score.toString().padStart(6, '0');
            document.getElementById('coin-display').innerText = 'COINS ' + coinCount.toString().padStart(2, '0');
            document.getElementById('lives-display').innerText = 'LIVES ' + lives;
            document.getElementById('high-score-display').innerText = 'HIGH ' + highScore.toString().padStart(6, '0');
        }

        // --- Rendering ---
        function draw() {
            const shakeX = screenShake ? (Math.random() - 0.5) * screenShake : 0;
            const shakeY = screenShake ? (Math.random() - 0.5) * screenShake : 0;

            ctx.save();
            ctx.translate(shakeX, shakeY);

            drawBackground();

            // Draw Clouds
            clouds.forEach(c => {
                drawCloud(c);
            });

            // Draw Platforms
            platforms.forEach(p => {
                drawPlatform(p);
            });

            pipes.forEach(pipe => {
                drawPipe(pipe);
            });

            // Draw Coins
            coins.forEach(coin => {
                drawCoin(coin);
            });

            // Draw Player
            drawPlayer();

            // Draw Enemies
            enemies.forEach(e => {
                drawEnemy(e);
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawBackground() {
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#a9dcff');
            sky.addColorStop(0.45, '#68a9ff');
            sky.addColorStop(1, '#4e84e6');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const sun = ctx.createRadialGradient(canvas.width * 0.78, canvas.height * 0.18, 10, canvas.width * 0.78, canvas.height * 0.18, 120);
            sun.addColorStop(0, 'rgba(255, 245, 178, 0.95)');
            sun.addColorStop(1, 'rgba(255, 245, 178, 0)');
            ctx.fillStyle = sun;
            ctx.beginPath();
            ctx.arc(canvas.width * 0.78, canvas.height * 0.18, 120, 0, Math.PI * 2);
            ctx.fill();

            drawMountainLayer(0.15, '#74a65a', 0.28, 0.45);
            drawMountainLayer(0.28, '#5b8f47', 0.38, 0.65);
            drawHorizonHills();

            const cloudLayer = ctx.createLinearGradient(0, 0, 0, canvas.height);
            cloudLayer.addColorStop(0, 'rgba(255,255,255,0.85)');
            cloudLayer.addColorStop(1, 'rgba(255,255,255,0.9)');
            ctx.fillStyle = cloudLayer;

            const groundGlow = ctx.createLinearGradient(0, floorY - 40, 0, canvas.height);
            groundGlow.addColorStop(0, 'rgba(255, 255, 255, 0)');
            groundGlow.addColorStop(1, 'rgba(54, 96, 32, 0.18)');
            ctx.fillStyle = groundGlow;
            ctx.fillRect(0, floorY - 40, canvas.width, canvas.height - floorY + 40);

            ctx.fillStyle = 'rgba(255,255,255,0.16)';
            for (let i = 0; i < 8; i++) {
                const x = (i * 180 + ((time * 0.12) % 180)) - 80;
                const y = 40 + (i % 3) * 26;
                ctx.beginPath();
                ctx.arc(x, y, 2.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawMountainLayer(speed, color, heightScale, widthScale) {
            const offset = -((gameSpeed * speed * frameCount) % (canvas.width * widthScale));
            ctx.fillStyle = color;
            for (let x = offset - canvas.width; x < canvas.width + canvas.width; x += canvas.width * widthScale) {
                ctx.beginPath();
                ctx.moveTo(x, canvas.height * 0.78);
                ctx.lineTo(x + canvas.width * 0.18, canvas.height * (0.78 - heightScale));
                ctx.lineTo(x + canvas.width * 0.36, canvas.height * 0.78);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawHorizonHills() {
            const baseY = floorY - 6;
            ctx.fillStyle = '#69b04f';
            const offset = -(gameSpeed * 0.35 * frameCount) % 220;
            for (let x = offset - 220; x < canvas.width + 220; x += 220) {
                ctx.beginPath();
                ctx.ellipse(x + 100, baseY + 20, 100, 26, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawCloud(c) {
            const bob = Math.sin((time * 0.02) + c.x * 0.01) * 2;
            const alpha = 0.78 + Math.sin(time * 0.01 + c.y * 0.02) * 0.08;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#fff';
            ctx.translate(c.x, c.y + bob);
            ctx.beginPath();
            ctx.ellipse(0, 0, c.size * 0.75, c.size * 0.45, 0, 0, Math.PI * 2);
            ctx.ellipse(c.size * 0.55, -c.size * 0.18, c.size * 0.55, c.size * 0.38, 0, 0, Math.PI * 2);
            ctx.ellipse(c.size * 1.05, 0, c.size * 0.72, c.size * 0.45, 0, 0, Math.PI * 2);
            ctx.ellipse(c.size * 0.5, c.size * 0.12, c.size * 1.05, c.size * 0.33, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawPlatform(p) {
            if (p.type === 'ground') {
                const grain = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
                grain.addColorStop(0, '#d66a1d');
                grain.addColorStop(0.3, '#c84c0c');
                grain.addColorStop(1, '#8e2f06');
                ctx.fillStyle = grain;
                ctx.fillRect(p.x, p.y, p.width, p.height);

                ctx.fillStyle = '#87d640';
                ctx.fillRect(p.x, p.y, p.width, 11);

                ctx.fillStyle = 'rgba(255,255,255,0.22)';
                ctx.fillRect(p.x, p.y + 11, p.width, 3);

                ctx.fillStyle = 'rgba(0,0,0,0.16)';
                for (let gx = p.x + 10; gx < p.x + p.width; gx += 20) {
                    ctx.fillRect(gx, p.y + 18, 4, 4);
                }

                ctx.strokeStyle = '#2c1803';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.width, p.height);
            } else {
                ctx.fillStyle = '#76c83f';
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = '#48a91d';
                ctx.fillRect(p.x - 4, p.y, p.width + 8, 28);
                ctx.strokeStyle = '#1a5a08';
                ctx.lineWidth = 4;
                ctx.strokeRect(p.x - 4, p.y, p.width + 8, 28);

                ctx.fillStyle = 'rgba(255,255,255,0.18)';
                ctx.fillRect(p.x, p.y, p.width, 4);
            }
        }

        function drawPipe(pipe) {
            const lipHeight = 16;
            const capHeight = 18;
            const bodyHeight = Math.max(0, pipe.height - capHeight);

            ctx.save();
            ctx.translate(pipe.x, pipe.y);

            const bodyGradient = ctx.createLinearGradient(0, 0, pipe.width, 0);
            bodyGradient.addColorStop(0, '#2b8f1f');
            bodyGradient.addColorStop(0.45, '#57d13e');
            bodyGradient.addColorStop(1, '#1f6c17');

            ctx.fillStyle = bodyGradient;
            roundRect(0, capHeight, pipe.width, bodyHeight, 6);
            ctx.fill();

            const capGradient = ctx.createLinearGradient(0, 0, pipe.width, 0);
            capGradient.addColorStop(0, '#4fbf34');
            capGradient.addColorStop(0.5, '#7be35a');
            capGradient.addColorStop(1, '#3ea92a');
            ctx.fillStyle = capGradient;
            roundRect(-8, 0, pipe.width + 16, capHeight, 8);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.16)';
            ctx.fillRect(3, capHeight + 2, 4, bodyHeight - 4);
            ctx.fillRect(pipe.width - 7, capHeight + 2, 3, bodyHeight - 4);

            ctx.strokeStyle = '#0f3d0c';
            ctx.lineWidth = 3;
            roundRect(-8, 0, pipe.width + 16, pipe.height, 8);
            ctx.stroke();

            ctx.restore();
        }

        function drawCoin(coin) {
            const bob = Math.sin(coin.spin) * 2;
            ctx.save();
            ctx.translate(coin.x + 8, coin.y + 8 + bob);
            ctx.rotate(Math.sin(coin.spin * 0.8) * 0.2);

            ctx.fillStyle = '#ffd54a';
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f7b500';
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#b57402';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 7, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawPlayer() {
            const walk = Math.sin(player.walkCycle);
            const bob = player.grounded ? Math.abs(Math.sin(player.walkCycle * 1.6)) * 1.5 : 0;
            const lean = player.vx * 2.2;
            const tilt = player.grounded ? Math.max(-10, Math.min(10, lean)) : Math.max(-14, Math.min(14, player.vy * 0.8));

            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2 + bob);
            ctx.scale(player.facing, 1);
            ctx.rotate((tilt * Math.PI) / 180);
            ctx.translate(-player.width / 2, -player.height / 2);

            ctx.globalAlpha = 0.22;
            ctx.fillStyle = '#2f450d';
            ctx.beginPath();
            ctx.ellipse(16, 33, 13, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalAlpha = 1;
            drawLimb(8, 20, 7, 12, '#582911', walk * 7, true);
            drawLimb(21, 20, 7, 12, '#582911', -walk * 7, true);
            drawLimb(10, 28, 9, 14, '#2e67d1', -walk * 7, false);
            drawLimb(18, 28, 9, 14, '#2e67d1', walk * 7, false);

            // Torso
            ctx.fillStyle = '#254aa5';
            roundRect(8, 13, 16, 16, 4);
            ctx.fill();
            ctx.fillStyle = '#f1c27d';
            roundRect(9, 11, 14, 8, 4);
            ctx.fill();

            // Overalls straps
            ctx.fillStyle = '#1d3990';
            ctx.fillRect(10, 13, 3, 11);
            ctx.fillRect(19, 13, 3, 11);
            ctx.fillStyle = '#f5d27d';
            ctx.fillRect(11, 18, 2, 2);
            ctx.fillRect(20, 18, 2, 2);

            // Head
            ctx.fillStyle = '#f4c48f';
            ctx.beginPath();
            ctx.ellipse(16, 10, 8, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Hat
            ctx.fillStyle = '#e52521';
            roundRect(8, 2, 16, 7, 3);
            ctx.fill();
            ctx.fillRect(6, 7, 20, 3);
            ctx.fillStyle = '#c71613';
            ctx.fillRect(8, 8, 16, 1);

            // Face and features
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(13.5, 9.5, 1.6, 2.2, 0, 0, Math.PI * 2);
            ctx.ellipse(18.5, 9.5, 1.6, 2.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.ellipse(14.2, 10.2, 0.6, 0.9, 0, 0, Math.PI * 2);
            ctx.ellipse(19.2, 10.2, 0.6, 0.9, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d28f6d';
            roundRect(12.2, 12.5, 7.4, 2.6, 1.2);
            ctx.fill();

            // Gloves and boots
            ctx.fillStyle = '#fff3df';
            roundRect(5, 18 + walk * 0.3, 6, 6, 2);
            roundRect(21, 18 - walk * 0.3, 6, 6, 2);
            ctx.fill();
            ctx.fillStyle = '#582911';
            roundRect(8 + walk * 0.2, 30, 8, 4, 2);
            roundRect(16 - walk * 0.2, 30, 8, 4, 2);
            ctx.fill();

            ctx.restore();
        }

        function drawLimb(x, y, width, height, color, swing, isArm) {
            ctx.save();
            ctx.translate(x + width / 2, y + height / 2);
            ctx.rotate((swing * Math.PI) / 180);
            ctx.translate(-width / 2, -height / 2);
            ctx.fillStyle = color;
            if (isArm) {
                roundRect(0, 0, width, height, 3);
            } else {
                roundRect(0, 0, width, height, 2);
            }
            ctx.fill();
            ctx.restore();
        }

        function drawEnemy(e) {
            const bob = Math.sin((frameCount + e.x) * 0.1) * 1.6;
            ctx.save();
            ctx.translate(e.x, e.y + bob);

            ctx.fillStyle = '#5a2d0c';
            ctx.beginPath();
            ctx.ellipse(16, 18, 15, 12, 0, Math.PI, 0);
            ctx.fill();

            ctx.fillStyle = '#8f4a1b';
            roundRect(2, 14, 28, 14, 7);
            ctx.fill();

            ctx.fillStyle = '#f0d9a8';
            roundRect(8, 16, 16, 8, 4);
            ctx.fill();

            ctx.fillStyle = '#000';
            if (e.frame === 0) {
                ctx.fillRect(7, 18, 3, 5);
                ctx.fillRect(21, 18, 3, 5);
            } else {
                ctx.fillRect(8, 19, 3, 5);
                ctx.fillRect(20, 19, 3, 5);
            }

            ctx.fillStyle = '#2f1c09';
            ctx.fillRect(4, 28, 8, 5);
            ctx.fillRect(20, 28, 8, 5);
            ctx.restore();
        }

        function roundRect(x, y, width, height, radius) {
            const r = Math.min(radius, width / 2, height / 2);
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + width, y, x + width, y + height, r);
            ctx.arcTo(x + width, y + height, x, y + height, r);
            ctx.arcTo(x, y + height, x, y, r);
            ctx.arcTo(x, y, x + width, y, r);
            ctx.closePath();
        }

        function resolveSolidCollision(entity, solid, allowSideBlock) {
            if (
                entity.x < solid.x + solid.width &&
                entity.x + entity.width > solid.x &&
                entity.y < solid.y + solid.height &&
                entity.y + entity.height > solid.y
            ) {
                const prevBottom = entity.y + entity.height - entity.vy;
                const wasAbove = prevBottom <= solid.y + 10;

                if (entity.vy >= 0 && wasAbove) {
                    entity.y = solid.y - entity.height;
                    entity.vy = 0;
                    entity.grounded = true;
                    return;
                }

                if (!allowSideBlock) {
                    return;
                }

                const overlapLeft = (entity.x + entity.width) - solid.x;
                const overlapRight = (solid.x + solid.width) - entity.x;
                if (overlapLeft < overlapRight) {
                    entity.x = solid.x - entity.width - 0.01;
                } else {
                    entity.x = solid.x + solid.width + 0.01;
                }

                if (entity.vx !== undefined) {
                    entity.vx = 0;
                }
            }
        }

        // Start
        init();

    </script>
